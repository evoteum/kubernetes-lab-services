apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argocd
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: kubernetes-lab-services
  annotations:
    evoteum.dev/why: "Open source secrets management (HashiCorp Vault fork)"
spec:
  project: default

  sources:
    - repoURL: https://openbao.github.io/openbao-helm
      chart: openbao
      targetRevision: 0.14.0
      helm:
        releaseName: openbao
        valueFiles:
          - $values/applications/openbao/values.yaml
    - repoURL: https://github.com/evoteum/kubernetes-lab-services
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: openbao

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
