apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
spec:
  project: default

  source:
    repoURL: ghcr.io/immich-app/immich-charts
    chart: immich
    targetRevision: 0.12.0
    helm:
      releaseName: immich
      valuesObject:
        controllers:
          main:
            containers:
              main:
                image:
                  tag: v2.6.3
                env:
                  DB_HOSTNAME: immich-database-rw
                  DB_PORT: "5432"
                  DB_DATABASE_NAME: immich
                  DB_USERNAME:
                    valueFrom:
                      secretKeyRef:
                        name: immich-database-credentials
                        key: username
                  DB_PASSWORD:
                    valueFrom:
                      secretKeyRef:
                        name: immich-database-credentials
                        key: password

        valkey:
          enabled: true
          persistence:
            data:
              enabled: true
              type: persistentVolumeClaim
              size: 1Gi
              accessMode: ReadWriteOnce
              storageClass: ceph-block

        immich:
          persistence:
            library:
              existingClaim: immich-library

  destination:
    server: https://kubernetes.default.svc
    namespace: immich

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true