apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: neo4j
  namespace: neo4j
  annotations:
    bumpCount: "1"
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-api-system
  hostnames:
    - neo4j.production.k8s.evoteum.com
  rules:
    - backendRefs:
        - name: neo4j
          port: 8000
