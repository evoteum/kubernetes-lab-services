apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubescape
  namespace: kubescape
  annotations:
    bumpCount: "1"
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-api-system
  hostnames:
    - kubescape.production.k8s.evoteum.com
  rules:
    - backendRefs:
        - name: kubescape
          port: 8000
