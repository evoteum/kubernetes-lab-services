apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backstage
  namespace: backstage
  annotations:
    bumpCount: "1"
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-api-system
  hostnames:
    - backstage.production.k8s.evoteum.com
  rules:
    - backendRefs:
        - name: backstage
          port: 8000
