apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich
  namespace: immich
  annotations:
    bumpCount: "1"
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-api-system
  hostnames:
    - immich.production.k8s.evoteum.com
  rules:
    - backendRefs:
        - name: immich
          port: 2283
