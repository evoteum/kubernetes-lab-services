apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/immich-app/immich-charts/immich
    chart: immich
    targetRevision: 0.12.0
    helm:
      values: |
        immich:
          persistence:
            library:
              existingClaim: immich-library
  destination:
    server: https://kubernetes.default.svc
    namespace: immich
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
