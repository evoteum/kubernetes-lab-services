apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: open-webui
  namespace: open-webui
  annotations:
    bumpCount: "1"
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-api-system
  hostnames:
    - open-webui.production.k8s.evoteum.com
  rules:
    - backendRefs:
        - name: open-webui
          port: 8080
