apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flagger
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://flagger.app
    chart: flagger/flagger
    targetRevision: 2.3.0
  destination:
    server: https://kubernetes.default.svc
    namespace: flagger
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
