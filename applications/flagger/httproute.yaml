apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flagger
  namespace: flagger
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-api-system
  hostnames:
    - flagger.production.k8s.evoteum.com
  rules:
    - backendRefs:
        - name: flagger
          port: 8000
